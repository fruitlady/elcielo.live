  - Planetary positions: astronomy-engine (VSOP87/ELP-2000), sub-arcsecond accuracy
    vs NASA JPL DE441. All bodies returned in true ecliptic of date (ECT).
  - Sidereal: Lahiri (Chitrapaksha) ayanamsa, anchored at 23°51'11.6" at J2000.0
    (ICRC 1956 standard / SE_SIDM_USER reference). Precession applied via
    astronomy-engine's full IAU 2006 rotation matrices including nutation.
  - Ascendant: true sidereal time (with nutation) + true obliquity of date.
    Matches Swiss Ephemeris to ~1 arcsecond.
  - Rise/set times: search forward from now for next occurrence.
  - Aspects: five major aspects (☌ ⚹ □ △ ☍) with applying/separating motion.
    Exact threshold: orb under 1 arcminute.
  - Stations: detected when daily motion in ecliptic longitude is under 2 arcmin.

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Inline SVG favicon — a single black dot, like the exact-aspect marker -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='6' fill='black'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ───────── Berkeley Mono — purchased license VX8P-7R53-1LLV-MQKJ ─────────
     TX-02 Berkeley Mono v2.004, built 2026-05-16 with plain zero and plain seven
     (zero.standard, seven.standard). Web Fonts module (LR-02) entitles
     elcielo.live to embed and serve these .woff2 files.
     
     Files live in /fonts/ at the site root (uploaded directly to Vercel,
     not committed to the public GitHub repo per license terms). */
  @font-face {
    font-family: 'Berkeley Mono';
    src: url('/fonts/BerkeleyMono-Regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Berkeley Mono';
    src: url('/fonts/BerkeleyMono-Bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Berkeley Mono';
    src: url('/fonts/BerkeleyMono-Oblique.woff2') format('woff2');
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: 'Berkeley Mono';
    src: url('/fonts/BerkeleyMono-Bold-Oblique.woff2') format('woff2');
    font-weight: 700;
    font-style: italic;
    font-display: swap;
  }
  :root {
    --ink: #000;
    --paper: #fff;
    --rx: #CC7722;
    --st: #A0432A;
    --mute: #888;
  }
  /* Night theme — page snaps to dark when the sun is below the horizon
     at the page's current location. Same instrument, inverted.
     Accent colors brightened slightly to maintain legibility on black:
     ochre and red both lifted in luminance, hue preserved.
     Applied at :root so html, body, and all descendants pick it up. */
  html.night {
    --ink: #fff;
    --paper: #000;
    --rx: #E89544;
    --st: #C76450;
    --mute: #777;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Berkeley Mono', 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-feature-settings: "tnum" 1, "zero" 1;
    font-variant-numeric: tabular-nums;
    font-size: 14px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    padding: 32px 32px 48px;  /* extra bottom padding for fixed credit clearance */
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  main {
    width: 100%;
    max-width: 640px;
  }
  .title {
    text-align: center;
    margin-bottom: 48px;  /* generous breathing room — for calm screenshots */
  }
  .wordmark {
    font-size: 16px;
    letter-spacing: 0.04em;
  }
  .subtitle {
    font-size: 14px;
    letter-spacing: 0.12em;
    color: var(--mute);
    margin-top: 6px;
  }
  /* The wordmark — clickable. Click reveals "SKY READING INSTRUMENT"
     and auto-reverts after a few seconds. Same typographic register as
     ELCIELO — uppercase, gray, same letter-spacing — so the swap reads
     as the wordmark speaking, not as new UI appearing. */
  .wordmark {
    cursor: pointer;
    user-select: none;
  }
  .wordmark:hover {
    color: var(--ink);
  }
  .wordmark.defined {
    /* Same styling as base — no visual transformation. The text content
       changes, the typography stays consistent. */
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 24px;
  }
  .header {
    margin-bottom: 24px;
  }
  .header .stamp {
    white-space: nowrap;
  }
  /* Boxed button — used for the NOW/THEN toggle.
     Visual grammar: bare text = data, boxed text = interactive.
     
     CRITICAL: The toggle has a fixed width sized for the longest label
     across all supported languages (currently "PASADO" at 6 chars). This
     prevents layout shift when toggling — the box stays exactly the same
     width and position whether it reads NOW, THEN, HOY, or PASADO. The
     wordmark beside it stays anchored; only the text inside the box changes. */
  .toggle {
    display: inline-block;
    padding: 3px 9px;
    border: 1px solid var(--mute);
    cursor: pointer;
    user-select: none;
    line-height: 1.2;
    text-transform: uppercase;
    /* Fixed width sized to the longest possible label across all languages.
       8ch comfortably fits PASADO (6 chars) with breathing room and accounts
       for monospace character width quirks across Berkeley Mono / JetBrains Mono. */
    min-width: 8ch;
    text-align: center;
    box-sizing: border-box;
  }
  .toggle:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  /* Hidden input that summons the mobile keyboard when wheel cells are
     tapped. Visually invisible but technically present and keystroke-
     capturing. We route keystrokes to the currently-active wheel cell. */
  #wheelInputProxy {
    position: absolute;
    left: -9999px;
    top: 0;
    width: 1px;
    height: 1px;
    opacity: 0;
    border: none;
    background: transparent;
    color: transparent;
    font-size: 16px;  /* >=16px prevents iOS auto-zoom on focus */
  }
  /* ───────── date stamp / wheels ─────────
     NOW mode: shows static date+time text (.stamp-now visible, .stamp-then hidden)
     THEN mode: shows editable wheels  (.stamp-now hidden, .stamp-then visible) */
  .stamp-then { display: none; }
  .then-mode .stamp-now { display: none; }
  /* Wheels container — plain inline display matches NOW mode's static text
     exactly. inline-flex was adding small gaps around separator spans;
     plain inline lets the typography flow as a single continuous line. */
  .then-mode .stamp-then { display: inline; }
  
  /* Wheel cells — each is a clickable+typeable region that cycles through values.
     Click to step forward, shift+click to step back, scroll to spin,
     arrow keys when focused to step, OR double-click / type-on-focus to enter
     a value directly (huge speed-up for big jumps like changing the year). */
  .wheel-cell {
    display: inline-block;
    cursor: text;
    user-select: none;
    /* Zero padding and margin — the cells must occupy EXACTLY the same width
       as the equivalent static characters in NOW mode. Any padding here makes
       WHEN mode wider than NOW mode and shifts the entire layout on toggle.
       Hover/focus visual feedback uses outline (which doesn't take space). */
    padding: 0;
    margin: 0;
    border-radius: 2px;
    transition: background-color 0.1s;
    text-transform: uppercase;
  }
  .wheel-cell:hover {
    background: color-mix(in srgb, var(--ink) 6%, transparent);
  }
  .wheel-cell:focus,
  .wheel-cell:focus-visible {
    outline: 1px solid var(--ink);
    outline-offset: 0;
  }
  .wheel-cell.editing {
    background: color-mix(in srgb, var(--rx) 12%, transparent);
    outline: 1px solid var(--rx);
  }
  .wheel-cell.spinning {
    background: color-mix(in srgb, var(--rx) 18%, transparent);
  }
  .wheel-val {
    font-variant-numeric: tabular-nums;
    display: inline-block;
  }
  .wheel-sep {
    color: var(--mute);
    padding: 0;  /* flush — no extra width between cells and separators */
  }
  /* On mobile, wheels stay at zero padding too — vital for layout stability */
  @media (max-width: 600px) {
    .wheel-cell { padding: 0; }
  }
  
  .loc {
    text-align: right;
    cursor: pointer;
    user-select: none;
    text-transform: uppercase;
  }
  .loc:hover .loc-name { text-decoration: underline; }
  .loc-arrow { color: var(--mute); margin-left: 4px; }
  .almanac {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
    font-size: 13px;
  }
  .almanac .cell {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .almanac .label {
    color: var(--mute);
    font-size: 11px;
    letter-spacing: 0.04em;
  }
  .systems {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    margin-bottom: 24px;
  }
  .system h2 {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--mute);
    margin-bottom: 10px;
  }
  .planet {
    display: grid;
    grid-template-columns: 36px 1fr 32px;
    gap: 8px;
    align-items: baseline;
    padding: 0;
  }
  .planet.retro {
    color: var(--rx);
  }
  .planet.station {
    color: var(--st);
  }
  /* Glyphs always keep their semantic color, regardless of row state.
     S is always red (station), ℞ is always ochre (retro).
     When both are present (planet stationing while retrograde),
     both glyphs show side by side in their own colors. */
  .planet .g-station { color: var(--st); }
  .planet .g-retro { color: var(--rx); }
  /* The trailing glyph column needs more room when both glyphs render */
  .planet .rx {
    white-space: nowrap;
  }
  .planet .pos {
    white-space: pre;
  }
  .planet .rx {
    color: transparent;
    text-align: right;
  }
  .planet.divider {
    margin-top: 8px;
  }
  /* aspects section — same visual voice as the systems columns */
  .aspects-section {
    margin-bottom: 24px;
    /* Match the planet column structure: aspects section is half-width
       (same as one of the two systems columns), so the motion glyph column
       aligns with the planets' S/℞ column. */
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 0 48px;
  }
  .aspects-section h2 {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--mute);
    margin-bottom: 10px;
    grid-column: 1;
    grid-row: 1;
  }
  #aspects {
    grid-column: 1;
    grid-row: 2;
  }
  .aspect {
    display: grid;
    grid-template-columns: 36px 16px 36px 1fr 32px;
    gap: 8px;
    align-items: baseline;
  }
  .aspect .sym { text-align: center; }
  .aspect .orb { white-space: pre; }
  .aspect .motion {
    color: var(--mute);
    font-size: 12px;
    white-space: nowrap;
    text-align: right;
  }
  .aspect.exact .motion {
    color: var(--ink);
  }
  /* Location autocomplete picker — replaces the location label inline
     when user clicks it. Anchored to the .loc div in the header row. */
  .loc {
    position: relative;  /* anchor for the absolute-positioned picker */
  }
  .loc-display {
    display: inline-block;
  }
  .loc-picker {
    position: absolute;
    top: 0;
    right: 0;
    background: var(--paper);
    display: none;
    z-index: 20;
    text-align: right;
    min-width: 240px;
  }
  .loc-picker.open {
    display: block;
  }
  /* When picker is open, hide the static location display so they don't overlap */
  .loc.picker-open .loc-display {
    visibility: hidden;
  }
  #locInput {
    font: inherit;
    border: none;
    outline: none;
    background: transparent;
    text-align: right;
    width: 100%;
    border-bottom: 1px solid var(--ink);
    padding: 2px 0;
    color: var(--ink);
    text-transform: uppercase;
  }
  #locInput::placeholder {
    color: var(--mute);
    text-transform: uppercase;
  }
  .loc-results {
    margin-top: 8px;
    text-align: right;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: var(--paper);  /* mask the chart below when results extend down */
    padding: 4px 0;
  }
  .loc-result {
    display: block;
    padding: 4px 8px;
    cursor: pointer;
    user-select: none;
    color: var(--ink);
    line-height: 1.3;
    font-size: 11px;
    background: var(--paper);  /* explicit background so hover tint reads cleanly */
  }
  .loc-result:hover,
  .loc-result.selected {
    background: color-mix(in srgb, var(--rx) 12%, transparent);
  }
  .loc-result .loc-region {
    color: var(--mute);
  }
  .loc-empty {
    color: var(--mute);
    padding: 3px 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  /* date prompt — mirror of locPrompt, anchored top-left */
  #datePrompt {
    position: fixed;
    top: 32px;
    left: 32px;
    background: var(--paper);
    border: none;
    padding: 8px 12px 0 0;
    font: inherit;
    display: none;
  }
  #datePrompt input {
    font: inherit;
    border: none;
    outline: none;
    background: transparent;
    text-align: left;
    width: 280px;
    border-bottom: 1px solid var(--ink);
    padding: 2px 0;
    color: var(--ink);
    text-transform: uppercase;
  }
  #datePrompt input::placeholder {
    color: var(--mute);
    text-transform: uppercase;
  }
  #datePrompt .hint {
    display: block;
    color: var(--mute);
    font-size: 11px;
    margin-top: 4px;
  }
  .credit {
    /* Pinned to bottom-right of viewport — true footer.
       Background color ensures content scrolling underneath gets cleanly
       masked, not overlapped visually. */
    position: fixed;
    bottom: 0;
    right: 0;
    padding: 12px 16px;
    background: var(--paper);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--mute);
    pointer-events: none;
    z-index: 5;
  }
  /* Language picker — pinned top-left, mirrors the credit's position+style.
     Both static elements anchored to the viewport corners. */
  .lang-picker {
    position: fixed;
    top: 16px;
    left: 16px;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--mute);
    z-index: 10;
  }
  .lang-opt {
    cursor: pointer;
    user-select: none;
    padding: 2px;
  }
  .lang-opt:hover {
    color: var(--ink);
  }
  .lang-opt.active {
    color: var(--ink);
  }
  .lang-sep {
    color: var(--mute);
  }
  /* mobile */
  @media (max-width: 600px) {
    html, body { font-size: 12px; }
    body {
      padding: 56px 14px 40px;  /* generous top padding so language picker has space above title */
      /* No vertical centering — keep the header anchored to top
         regardless of how much content is below. This prevents the
         page from jumping vertically when toggling NOW↔THEN. */
    }
    main { max-width: 100%; }
    .title { margin-bottom: 32px; }
    .subtitle { font-size: 12px; }
    .header { margin-bottom: 16px; gap: 12px; }
    .almanac {
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 22px;
      font-size: 11px;
    }
    .almanac .label { font-size: 9px; }
    .systems {
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }
    .system h2 { font-size: 9px; margin-bottom: 6px; }
    .planet { grid-template-columns: 28px 1fr 28px; gap: 4px; }
    .aspects-section {
      margin-bottom: 18px;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 0 14px;
    }
    .aspects-section h2 { font-size: 9px; margin-bottom: 6px; }
    .aspect { grid-template-columns: 28px 14px 28px 1fr 28px; gap: 4px; font-size: 11px; }
    .aspect .motion { font-size: 10px; }
    .credit { font-size: 9px; padding: 8px 12px; }
    .lang-picker { font-size: 9px; top: 12px; left: 12px; }
    .loc-picker { min-width: 180px; max-width: calc(100vw - 28px); }
    .loc-result { font-size: 11px; }
    #datePrompt { top: 16px; left: 14px; }
    #datePrompt input { width: 200px; }
  }
  /* loading state — invisible until ready, so the page never flashes wrong values */
  .pending { visibility: hidden; }
  
  /* ───────── PRINT STYLES ─────────
     Activated when the user prints (Cmd+P) or saves to PDF. The page is
     designed to be printable as a clean black-and-white document — a real
     paper artifact, not a screenshot of a webpage. The fax made literal.
  */
  @media print {
    /* Force light theme regardless of day/night — printing black backgrounds wastes ink */
    html, html.night {
      --ink: #000;
      --paper: #fff;
      --rx: #000;       /* on paper, accent colors collapse to ink — readable without color */
      --st: #000;
      --mute: #555;
    }
    body {
      padding: 0;
      min-height: auto;
    }
    main {
      max-width: 100%;
    }
    /* Hide interactive UI: language picker, hover affordances, location arrow */
    .lang-picker, .loc-arrow {
      display: none !important;
    }
    /* The toggle box and wordmark hover effects don't make sense on paper */
    .toggle {
      border: none;
      padding: 0;
    }
    .wordmark { cursor: default; }
    /* Retrograde and station markers — on paper they become italic instead of colored,
       since color is unreliable in print but italic is universal. */
    .planet.retro, .planet.station {
      color: var(--ink);
    }
    .planet .g-station,
    .planet .g-retro {
      color: var(--ink);
      font-style: italic;
    }
    /* The credit becomes the printed-page masthead: source + author.
       Removed from fixed positioning so it sits naturally at the bottom of the document. */
    .credit {
      position: static;
      text-align: right;
      margin-top: 40px;
      bottom: auto;
      right: auto;
    }
    /* The credit element is replaced entirely in print mode by a custom block
       containing the URL+date (source) and the author beneath it (smaller). */
    .credit::before {
      content: 'ELCIELO.LIVE · ' attr(data-print-date);
      display: block;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--ink);
    }
    .credit {
      font-size: 9px;  /* "MADE BY ISABELLA CRESPO" smaller, beneath the source line */
      letter-spacing: 0.12em;
      color: var(--mute);
      padding-top: 2px;
    }
    /* Prevent the chart from being split awkwardly across pages */
    .systems, .aspects-section, .almanac {
      page-break-inside: avoid;
    }
    /* Anchored credit shouldn't push content; ensure no extra page break */
    .title { margin-bottom: 32px; }
  }
</style>
</head>
<body>
<main id="app" class="pending">
  <div class="title">
    <div class="subtitle"><span class="wordmark" id="wordmark" data-i18n="wordmark">ELCIELO</span> · <span class="toggle" id="modeToggle">NOW</span></div>
  </div>

  <div class="row header">
    <div class="stamp" id="timeBtn">
      <!-- NOW mode: plain date display -->
      <span class="stamp-now"><span id="date"></span> · <span id="time"></span></span>
      <!-- THEN mode: spinnable wheels for each date component.
           Layout mirrors NOW's `FRI 15 MAY 2026 · 22:18` exactly so that
           toggling between modes feels like the text becoming editable,
           not a layout change. -->
      <div class="stamp-then" id="stampThen"><span class="wheel-cell" data-wheel="weekday"><span class="wheel-val" id="w-weekday"></span></span><span class="wheel-sep"> </span><span class="wheel-cell" data-wheel="day"><span class="wheel-val" id="w-day"></span></span><span class="wheel-sep"> </span><span class="wheel-cell" data-wheel="month"><span class="wheel-val" id="w-month"></span></span><span class="wheel-sep"> </span><span class="wheel-cell" data-wheel="year"><span class="wheel-val" id="w-year"></span></span><span class="wheel-sep"> · </span><span class="wheel-cell" data-wheel="hour"><span class="wheel-val" id="w-hour"></span></span><span class="wheel-sep">:</span><span class="wheel-cell" data-wheel="minute"><span class="wheel-val" id="w-minute"></span></span><input id="wheelInputProxy" type="text" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" aria-hidden="true"></div>
    </div>
    <div class="loc" id="locBtn">
      <span class="loc-display">
        <span class="loc-name" id="locName">—</span><span class="loc-arrow">↓</span>
      </span>
      <div id="locPicker" class="loc-picker">

<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
<script>
/* ───────── i18n ─────────
   Translation table. Add new languages by adding a column.
   Planet codes (SUN MOO MER...) and sign codes (ARI TAU GEM...) are intentionally
   NOT translated — they're universal astrology shorthand.
   
   Word note: ALUNACER (Spanish, for "moonrise") is a neologism coined by
   Isabella Crespo on May 15, 2026, following the morphological pattern of
   amanecer/atardecer/anochecer. First published here.
*/
const LANGUAGES = ['en', 'es'];
const LANGUAGE_LABELS = { en: 'EN', es: 'ES' };

const TRANSLATIONS = {
  // Mode toggle. The page is a time machine — it can compute planetary
  // positions for any moment past or future to sub-arcsecond precision.
  // The toggle is the time-machine control. NOW shows the present sky
  // ticking live; WHEN opens the wheels to navigate to any other moment.
  // 
  // WHEN / CUÁNDO is directionally neutral — past AND future, equally.
  // PASADO would have locked it to past; OTHER would have been flat;
  // WHEN reads as "the question the wheels answer."
  now:        { en: 'NOW',     es: 'HOY' },
  then:       { en: 'WHEN',    es: 'CUÁNDO' },
  
  // The label that precedes the toggle: "THE SKY" in English vs "ELCIELO" in Spanish.
  // English points at what's shown. Spanish names the instrument doing the pointing.
  wordmark:   { en: 'ELCIELO', es: 'ELCIELO' },
  
  // Self-definition shown when the wordmark is clicked.
  // The page explains itself in its own voice. Same font size and gray tone
  // as the wordmark — reads as a register of the wordmark itself.
  // English compounds the noun ("sky reading instrument").
  // Spanish flows it ("instrumento lector del cielo").
  wordmarkDef:{ en: 'SKY READING INSTRUMENT', es: 'INSTRUMENTO LECTOR DEL CIELO' },
  
  // Almanac labels
  sunrise:    { en: 'SUNRISE',  es: 'AMANECER' },
  sunset:     { en: 'SUNSET',   es: 'ATARDECER' },
  moonrise:   { en: 'MOONRISE', es: 'ALUNACER' },
  moon:       { en: 'MOON',     es: 'LUNA' },
  
  // System headers
  western:    { en: 'WESTERN · TROPICAL', es: 'OCCIDENTAL · TROPICAL' },
  vedic:      { en: 'VEDIC · SIDEREAL',   es: 'VÉDICA · SIDÉREA' },
  aspects:    { en: 'ASPECTS', es: 'ASPECTOS' },
  
  // Header location / prompts
  here:       { en: 'HERE',    es: 'AQUÍ' },
  cityCountry:{ en: 'CITY, COUNTRY', es: 'CIUDAD, PAÍS' },
  enterEsc:   { en: 'ENTER · ESC', es: 'ENTRAR · ESC' },
  newYork:    { en: 'NEW YORK', es: 'NUEVA YORK' },
  
  // Credit
  madeBy:     { en: 'MADE BY ISABELLA CRESPO', es: 'HECHO POR ISABELLA CRESPO' },
  
  // Moon phase names
  phaseNew:       { en: 'NEW',        es: 'NUEVA' },
  phaseWaxCres:   { en: 'WAX CRES',   es: 'CRECIENTE' },
  phaseFirstQtr:  { en: 'FIRST QTR',  es: 'CUARTO CRECIENTE' },
  phaseWaxGib:    { en: 'WAX GIB',    es: 'GIBOSA CRECIENTE' },
  phaseFull:      { en: 'FULL',       es: 'LLENA' },
  phaseWanGib:    { en: 'WAN GIB',    es: 'GIBOSA MENGUANTE' },
  phaseLastQtr:   { en: 'LAST QTR',   es: 'CUARTO MENGUANTE' },
  phaseWanCres:   { en: 'WAN CRES',   es: 'MENGUANTE' },
};

// Weekday and month names per language (3-letter abbreviations)
const WEEKDAYS_BY_LANG = {
  en: ['SUN','MON','TUE','WED','THU','FRI','SAT'],
  es: ['DOM','LUN','MAR','MIE','JUE','VIE','SAB'],
};
const MONTHS_BY_LANG = {
  en: ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'],
  es: ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'],
};

// Current active language — read from URL first, then localStorage, then browser, then English fallback.
let currentLang = (function detectLang() {
  const urlLang = new URLSearchParams(window.location.search).get('lang');
  if (urlLang && LANGUAGES.includes(urlLang)) return urlLang;
  try {
    const stored = localStorage.getItem('elcielo_lang');
    if (stored && LANGUAGES.includes(stored)) return stored;
  } catch (e) {}
  const browserLang = (navigator.language || 'en').slice(0, 2).toLowerCase();
  if (LANGUAGES.includes(browserLang)) return browserLang;
  return 'en';
})();

function t(key) {
  const entry = TRANSLATIONS[key];
  if (!entry) return key;
  return entry[currentLang] || entry.en || key;
}

function setLang(lang) {
  if (!LANGUAGES.includes(lang) || lang === currentLang) return;
  currentLang = lang;
  try { localStorage.setItem('elcielo_lang', lang); } catch (e) {}
  // Update URL — preserve other params like ?t=...
  const params = new URLSearchParams(window.location.search);
  if (lang === 'en') {
    params.delete('lang');
  } else {
    params.set('lang', lang);
  }
  const newSearch = params.toString();
  history.replaceState(null, '', window.location.pathname + (newSearch ? '?' + newSearch : ''));
  applyStaticTranslations();
  renderLangPicker();
  render();
}

function renderLangPicker() {
  const picker = document.getElementById('langPicker');
  if (!picker) return;
  picker.innerHTML = LANGUAGES.map(lang => {
    const active = lang === currentLang;
    return `<span class="lang-opt${active ? ' active' : ''}" data-lang="${lang}">${LANGUAGE_LABELS[lang]}</span>`;
  }).join('<span class="lang-sep"> · </span>');
  picker.querySelectorAll('.lang-opt').forEach(el => {
    el.addEventListener('click', () => setLang(el.dataset.lang));
  });
}

/* Update labels that are static in the HTML (almanac labels, section headers, etc.) */
function applyStaticTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    // Skip the wordmark if it's currently revealed — its content is special
    if (el.id === 'wordmark' && el.classList.contains('defined')) return;
    el.textContent = t(el.dataset.i18n);
  });
  // The location input placeholder
  const locInput = document.getElementById('locInput');
  if (locInput) locInput.placeholder = t('cityCountry');
}

/* ───────── astronomy ───────── */
const SIGNS = ['ARI','TAU','GEM','CAN','LEO','VIR','LIB','SCO','SAG','CAP','AQU','PIS'];
const BODIES = [
  { code: 'SUN', name: 'Sun' },
  { code: 'MOO', name: 'Moon' },
  { code: 'MER', name: 'Mercury' },
  { code: 'VEN', name: 'Venus' },
  { code: 'MAR', name: 'Mars' },
  { code: 'JUP', name: 'Jupiter' },
  { code: 'SAT', name: 'Saturn' },
  { code: 'URA', name: 'Uranus' },
  { code: 'NEP', name: 'Neptune' },
  { code: 'PLU', name: 'Pluto' },
];

/* Aspect definitions — the five major aspects with their orbs.
   Orbs: 6° for the major four, 4° for the sextile (per common practice).
   Exact threshold (when arrows collapse to •): under 1 arcminute. */
const ASPECTS = [
  { symbol: '☌', angle: 0,   orb: 6 },  // conjunction
  { symbol: '⚹', angle: 60,  orb: 4 },  // sextile
  { symbol: '□', angle: 90,  orb: 6 },  // square
  { symbol: '△', angle: 120, orb: 6 },  // trine
  { symbol: '☍', angle: 180, orb: 6 },  // opposition
];

function angularSep(a, b) {
  // Minimum angular separation 0-180 between two ecliptic longitudes
  let d = Math.abs(a - b) % 360;
  if (d > 180) d = 360 - d;
  return d;
}

function computeAspects(date) {
  // Compute all active aspects at `date`, with applying/separating motion
  // determined by comparing orb at `date` vs `date + 1 hour`.
  const future = new Date(date.getTime() + 3600 * 1000);
  const positions = {};
  const futurePositions = {};
  for (const b of BODIES) {
    positions[b.code] = eclipticLongitude(b.name, date);
    futurePositions[b.code] = eclipticLongitude(b.name, future);
  }

  const results = [];
  for (let i = 0; i < BODIES.length; i++) {
    for (let j = i + 1; j < BODIES.length; j++) {
      const a = BODIES[i], b = BODIES[j];
      const sep = angularSep(positions[a.code], positions[b.code]);
      const futureSep = angularSep(futurePositions[a.code], futurePositions[b.code]);

      for (const asp of ASPECTS) {
        const orb = Math.abs(sep - asp.angle);
        if (orb <= asp.orb) {
          const futureOrb = Math.abs(futureSep - asp.angle);
          // Motion glyph: applying = arrows pointing inward (→ ←)
          //               separating = arrows pointing outward (← →)
          //               exact (< 1 arcmin) = a single dot
          let motion, exact = false;
          if (orb < 1/60) { motion = '●'; exact = true; }
          else if (futureOrb < orb) motion = '→ ←';
          else motion = '← →';

          results.push({
            a: a.code, b: b.code, symbol: asp.symbol,
            orb, motion, exact
          });
        }
      }
    }
  }

  results.sort((x, y) => x.orb - y.orb);
  return results;
}

function fmtAspectOrb(deg) {
  const d = Math.floor(deg);
  const m = Math.floor((deg - d) * 60);
  return `${String(d).padStart(2, ' ')}° ${String(m).padStart(2, '0')}'`;
}

// Lahiri ayanamsa (Chitrapaksha) — true precession using astronomy-engine's rotation chain.
// Anchored at the ICRC standard value of 23.853222° at J2000.0 (the canonical SE_SIDM_USER reference).
// Method: take a fixed direction in J2000 ecliptic frame at longitude 23.853222°
// (the J2000 tropical longitude of the sidereal zero point), precess it to the
// true ecliptic of date (ECT) — its longitude in that frame IS the ayanamsa.
// This is internally consistent with the planetary positions, which are also in ECT-of-date.
function lahiriAyanamsa(date) {
  const REF_LON_J2000 = 23.853222; // ICRC standard at J2000.0
  const r = Math.PI / 180;
  const time = Astronomy.MakeTime(date);
  const vecECL = new Astronomy.Vector(
    Math.cos(REF_LON_J2000 * r),
    Math.sin(REF_LON_J2000 * r),
    0,
    time
  );
  const rotECLtoEQJ = Astronomy.Rotation_ECL_EQJ();
  const rotEQJtoECT = Astronomy.Rotation_EQJ_ECT(time);
  const combined = Astronomy.CombineRotation(rotECLtoEQJ, rotEQJtoECT);
  const vecECT = Astronomy.RotateVector(combined, vecECL);
  let lonECT = Math.atan2(vecECT.y, vecECT.x) / r;
  return ((lonECT % 360) + 360) % 360;
}

function normDeg(d) { d = d % 360; return d < 0 ? d + 360 : d; }

function formatPos(eclLon) {
  const lon = normDeg(eclLon);
  const signIdx = Math.floor(lon / 30);
  const within = lon - signIdx * 30;
  const deg = Math.floor(within);
  const min = Math.floor((within - deg) * 60);
  // monospaced columns: right-justify degree to 2 chars, then sign, then min to 2 chars
  return `${String(deg).padStart(2, ' ')}° ${SIGNS[signIdx]} ${String(min).padStart(2, '0')}'`;
}

/* Ascendant calculation — uses astronomy-engine's TRUE sidereal time (includes nutation)
   and TRUE obliquity of date.
   
   Formula (Meeus, Astronomical Algorithms): 
     tan(ASC) = -cos(θ) / (sin(ε)·tan(φ) + cos(ε)·sin(θ))
   where θ = local sidereal time, ε = obliquity, φ = geographic latitude.
   
   This formula returns the rising point OR the setting point, separated by 180°.
   The correct branch is determined by the position of the MC: the ASC must be
   roughly 90° east of the MC on the ecliptic. If the raw formula returns a value
   that doesn't satisfy this constraint (i.e., (ASC - MC) mod 360 not in [90°, 270°]),
   we add 180° to flip to the correct branch.
   
   MC is computed from the same θ and ε:
     tan(MC) = sin(θ) / (cos(θ)·cos(ε))
   
   Accuracy: matches Swiss Ephemeris / Astrodienst to ~0.01°. */
function ascendant(date, latDeg, lonDeg) {
  const r = Math.PI / 180;
  // True sidereal time (with nutation), in hours
  const gst = Astronomy.SiderealTime(date);
  const lst = ((gst * 15 + lonDeg) % 360 + 360) % 360;
  // True obliquity of date via the EQD→ECT rotation: angle between EQD z-axis (Earth's rotation pole)
  // and ECT z-axis (true ecliptic pole)
  const t = Astronomy.MakeTime(date);
  const rotEQDtoECT = Astronomy.Rotation_EQD_ECT(t);
  const zEQD = new Astronomy.Vector(0, 0, 1, t);
  const zECT = Astronomy.RotateVector(rotEQDtoECT, zEQD);
  const eps = Math.acos(Math.max(-1, Math.min(1, zECT.z))) / r;
  
  const theta = lst * r;
  const phi = latDeg * r;
  const epsilon = eps * r;
  
  // Raw ASC from formula (may be on wrong branch)
  let asc = Math.atan2(
    -Math.cos(theta),
    Math.sin(epsilon) * Math.tan(phi) + Math.cos(epsilon) * Math.sin(theta)
  ) / r;
  asc = ((asc % 360) + 360) % 360;
  
  // MC for branch check
  let mc = Math.atan2(
    Math.sin(theta),
    Math.cos(theta) * Math.cos(epsilon)
  ) / r;
  mc = ((mc % 360) + 360) % 360;
  
  // Branch correction: ASC must be in the eastern half from MC (i.e., (ASC - MC) ∈ [90°, 270°])
  const diff = ((asc - mc + 360) % 360);
  if (diff < 90 || diff > 270) {
    asc = (asc + 180) % 360;
  }
  
  return asc;
}

/* retrograde detection — compare geocentric ecliptic longitude now vs 1 hour ahead.
   sun and moon never retrograde. */
/* Motion state of a planet at a given moment.
   Returns an object with TWO independent flags:
     retro: true if motion is backward (negative daily longitude change)
     station: true if motion magnitude is under 0.1 arcmin/day
   
   The station threshold (0.1 arcmin/day = 6 arcseconds/day) catches the
   astrologically meaningful station window — roughly ±3 days around the
   exact station for outer planets, shorter for inner planets. A looser
   threshold (e.g., 2 arcmin/day) incorrectly flags outer planets as
   stationary for weeks at a time, since they normally move slowly.
   
   Stations are mutually exclusive with normal motion — but a planet can
   be both stationary AND retrograde (motion slightly negative but tiny),
   in which case both flags fire. Sun and Moon never retrograde.
*/
function motionState(bodyName, date) {
  if (bodyName === 'Sun' || bodyName === 'Moon') return { retro: false, station: false };
  const tomorrow = new Date(date.getTime() + 86400 * 1000);
  const e1 = eclipticLongitude(bodyName, date);
  const e2 = eclipticLongitude(bodyName, tomorrow);
  let d = e2 - e1;
  if (d > 180) d -= 360;
  if (d < -180) d += 360;
  const arcminPerDay = d * 60;
  return {
    retro: arcminPerDay < 0,
    station: Math.abs(arcminPerDay) < 0.1,
  };
}

function eclipticLongitude(bodyName, date) {
  if (bodyName === 'Moon') {
    // EclipticGeoMoon gives high-precision lunar ecliptic position
    const m = Astronomy.EclipticGeoMoon(date);
    return m.lon;
  }
  if (bodyName === 'Sun') {
    // Sun's geocentric ecliptic longitude
    const v = Astronomy.GeoVector('Sun', date, true);
    const e = Astronomy.Ecliptic(v);
    return e.elon;
  }
  const v = Astronomy.GeoVector(bodyName, date, true);
  const e = Astronomy.Ecliptic(v);
  return e.elon;
}

function moonPhaseLabel(date) {
  const angle = Astronomy.MoonPhase(date); // 0..360, 0=new, 90=first qtr, 180=full, 270=last qtr
  const illum = Astronomy.Illumination('Moon', date).phase_fraction;
  const pct = Math.round(illum * 100);
  let key;
  if (angle < 22.5 || angle >= 337.5) key = 'phaseNew';
  else if (angle < 67.5) key = 'phaseWaxCres';
  else if (angle < 112.5) key = 'phaseFirstQtr';
  else if (angle < 157.5) key = 'phaseWaxGib';
  else if (angle < 202.5) key = 'phaseFull';
  else if (angle < 247.5) key = 'phaseWanGib';
  else if (angle < 292.5) key = 'phaseLastQtr';
  else key = 'phaseWanCres';
  return `${t(key)} ${pct}%`;
}

/* Is the sun above the horizon at this moment from this location?
   This drives the page color: day = light theme, night = dark theme.
   The threshold is the geometric horizon (altitude = 0°). The page snaps
   to dark at the moment the sun's center crosses below the horizon — the
   same instant shown in the SUNSET almanac.
   
   In THEN mode, this evaluates the historical moment being displayed, so
   the page mirrors the sky over the location at the chosen time.
*/
function isDaytime(date, latDeg, lonDeg) {
  const observer = new Astronomy.Observer(latDeg, lonDeg, 0);
  // Get the Sun's equatorial position, then convert to horizontal (altitude/azimuth)
  const equ = Astronomy.Equator('Sun', date, observer, true, true);
  const hor = Astronomy.Horizon(date, observer, equ.ra, equ.dec, 'normal');
  return hor.altitude > 0;
}

function fmtTime(date) {
  if (!date) return '—';
  const tz = getLocationTz();
  return date.toLocaleTimeString('en-GB', {
    timeZone: tz,
    hour: '2-digit', minute: '2-digit', hour12: false,
  });
}

function fmtDate(date) {
  // Match the WHEN wheel format exactly: FRI 15 MAY 2026 (or VIE 15 MAY 2026 in Spanish)
  // Date components rendered in the LOCATION's timezone — so a Quito chart
  // viewed from NY shows Quito's date, not NY's. Same principle as the wheels.
  const tz = getLocationTz();
  const p = getPartsInTz(date, tz);
  const days = WEEKDAYS_BY_LANG[currentLang] || WEEKDAYS_BY_LANG.en;
  const months = MONTHS_BY_LANG[currentLang] || MONTHS_BY_LANG.en;
  return `${days[p.weekday]} ${String(p.day).padStart(2,'0')} ${months[p.month]} ${p.year}`;
}

/* ───────── location ───────── */
const DEFAULT_LOC = { name: 'new york', lat: 40.7128, lon: -74.0060, tz: 'America/New_York' };

function loadLocation() {
  try {
    const stored = localStorage.getItem('elcielo_loc');
    if (stored) {
      const loc = JSON.parse(stored);
      // Backfill missing tz field for locations saved before tz support
      if (!loc.tz) loc.tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      return loc;
    }
  } catch (e) {}
  return DEFAULT_LOC;
}

function saveLocation(loc) {
  try { localStorage.setItem('elcielo_loc', JSON.stringify(loc)); } catch (e) {}
}

/* ───────── mode state ─────────
   Two states the render function distinguishes between:
     'now'           → live, ticking, current time, default
     'then-set'      → frozen at a specific moment chosen via the wheels;
                       page shows full data for that moment
   Mode lives in the URL so it's shareable:
     /                          → NOW
     /?t=YYYY-MM-DDTHH:MM       → THEN-set (locked to that moment)
*/
let frozenTime = null;
let mode = 'now'; // 'now' | 'then-set'

function getTime() {
  return frozenTime || new Date();
}

/* ───────── render ───────── */
function render() {
  const loc = loadLocation();

  // Update mode flag on body for CSS (controls which date display shows)
  document.body.classList.toggle('then-mode', mode === 'then-set');

  // The toggle button label always reads the current mode
  const toggleEl = document.getElementById('modeToggle');
  toggleEl.textContent = (mode === 'now') ? t('now') : t('then');

  // Render the full chart for whatever moment is current
  const now = getTime();

  // Set the printed date on the credit element so print CSS can render it.
  // Format: YYYY-MM-DD, matching ISO conventions for documentary precision.
  const printDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const creditEl = document.querySelector('.credit');
  if (creditEl) creditEl.setAttribute('data-print-date', printDate);

  // Day/night: page snaps light when sun is above horizon at loc, dark otherwise.
  // In THEN mode this reflects the historical moment over the chosen location —
  // the page mirrors the sky it's showing, not the sky over the viewer.
  try {
    const day = isDaytime(now, loc.lat, loc.lon);
    document.documentElement.classList.toggle('night', !day);
  } catch (e) {
    // Polar day/night or computation edge case — default to day
    document.documentElement.classList.remove('night');
  }

  // In NOW mode, update the static date/time text — always in location's timezone
  if (mode === 'now') {
    const tz = getLocationTz();
    document.getElementById('date').textContent = fmtDate(now);
    document.getElementById('time').textContent = now.toLocaleTimeString('en-GB', {
      timeZone: tz,
      hour: '2-digit', minute: '2-digit', hour12: false,
    });
  } else {
    // In WHEN mode, the wheels show the date; sync them to current frozenTime
    renderWheels();
  }
  // Location display: if user is on the default NYC location, show the translated name
  // ("NEW YORK" in EN, "NUEVA YORK" in ES). User-set locations keep their original input.
  let displayLocName = loc.name;
  if (loc.name === 'new york') displayLocName = t('newYork');
  document.getElementById('locName').textContent = displayLocName;

  // sun/moon times — search forward from `now` for the next rise/set.
  // When frozen, this still gives "next after the frozen moment", which is what you'd want
  // when looking up a historical sky — what was the next sunrise after that event?
  const observer = new Astronomy.Observer(loc.lat, loc.lon, 0);
  try {
    const sr = Astronomy.SearchRiseSet('Sun', observer, +1, now, 2);
    const ss = Astronomy.SearchRiseSet('Sun', observer, -1, now, 2);
    const mr = Astronomy.SearchRiseSet('Moon', observer, +1, now, 2);
    document.getElementById('sunrise').textContent = sr ? fmtTime(sr.date) : '—';
    document.getElementById('sunset').textContent = ss ? fmtTime(ss.date) : '—';
    document.getElementById('moonrise').textContent = mr ? fmtTime(mr.date) : '—';
  } catch (e) {
    console.warn('rise/set error', e);
  }

  document.getElementById('moonphase').textContent = moonPhaseLabel(now);

  // planetary positions
  const ayan = lahiriAyanamsa(now);
  const tropicalEl = document.getElementById('tropical');
  const siderealEl = document.getElementById('sidereal');
  tropicalEl.innerHTML = '';
  siderealEl.innerHTML = '';

  for (const body of BODIES) {
    const lon = eclipticLongitude(body.name, now);
    const motion = motionState(body.name, now);
    const tropPos = formatPos(lon);
    const sidPos = formatPos(lon - ayan);
    tropicalEl.appendChild(makeRow(body.code, tropPos, motion));
    siderealEl.appendChild(makeRow(body.code, sidPos, motion));
  }

  // ascendant
  const ascLon = ascendant(now, loc.lat, loc.lon);
  const ascTrop = formatPos(ascLon);
  const ascSid = formatPos(ascLon - ayan);
  const ascRowT = makeRow('ASC', ascTrop, { retro: false, station: false });
  const ascRowS = makeRow('ASC', ascSid, { retro: false, station: false });
  ascRowT.classList.add('divider');
  ascRowS.classList.add('divider');
  tropicalEl.appendChild(ascRowT);
  siderealEl.appendChild(ascRowS);

  // aspects — top 8 tightest, applies to both zodiacs since geometry is shared
  const aspectsEl = document.getElementById('aspects');
  aspectsEl.innerHTML = '';
  const activeAspects = computeAspects(now).slice(0, 8);
  for (const asp of activeAspects) {
    const row = document.createElement('div');
    row.className = 'aspect' + (asp.exact ? ' exact' : '');
    row.innerHTML = `<span>${asp.a}</span><span class="sym">${asp.symbol}</span><span>${asp.b}</span><span class="orb">${fmtAspectOrb(asp.orb)}</span><span class="motion">${asp.motion}</span>`;
    aspectsEl.appendChild(row);
  }

  document.getElementById('app').classList.remove('pending');
}

function makeRow(code, pos, motion) {
  const row = document.createElement('div');
  let cls = 'planet';
  // Row color: station wins (rarer, more time-bounded) when both are active.
  // Otherwise retro colors the row. Direct/normal motion gets no row color.
  if (motion.station) cls += ' station';
  else if (motion.retro) cls += ' retro';
  row.className = cls;
  // Glyphs render independently: both can appear at once when both states are true.
  // S in red (station), ℞ in ochre (retro). Side by side, semantically distinct.
  const glyphs = [];
  if (motion.station) glyphs.push('<span class="g-station">S</span>');
  if (motion.retro) glyphs.push('<span class="g-retro">℞</span>');
  const glyphHTML = glyphs.join(' ');
  row.innerHTML = `<span>${code}</span><span class="pos">${pos}</span><span class="rx">${glyphHTML}</span>`;
  return row;
}

/* ───────── location autocomplete ─────────
   Click the location label → input opens. Type → debounced search (300ms)
   hits Open-Meteo's free geocoding API → up to 5 results show below the
   input as a list. Click or arrow+Enter to select. Escape or click outside
   to close. */
const locBtn = document.getElementById('locBtn');
const locPicker = document.getElementById('locPicker');
const locInput = document.getElementById('locInput');
const locResults = document.getElementById('locResults');

let searchTimer = null;
let results = [];
let selectedIdx = -1;

function openLoc() {
  locPicker.classList.add('open');
  locBtn.classList.add('picker-open');
  locInput.value = '';
  locInput.placeholder = t('cityCountry');
  locResults.innerHTML = '';
  results = [];
  selectedIdx = -1;
  setTimeout(() => locInput.focus(), 50);
}

function closeLoc() {
  locPicker.classList.remove('open');
  locBtn.classList.remove('picker-open');
  locResults.innerHTML = '';
  results = [];
  selectedIdx = -1;
}

function renderResults() {
  if (results.length === 0) {
    // Only show empty state if user has actually typed something
    if (locInput.value.trim().length >= 2) {
      locResults.innerHTML = '<div class="loc-empty">NO MATCHES</div>';
    } else {
      locResults.innerHTML = '';
    }
    return;
  }
  locResults.innerHTML = results.map((r, i) => {
    const region = [r.admin1, r.country].filter(x => x && x !== r.name).join(', ');
    return `<div class="loc-result${i === selectedIdx ? ' selected' : ''}" data-idx="${i}">${r.name}<span class="loc-region">${region ? ', ' + region : ''}</span></div>`;
  }).join('');
  locResults.querySelectorAll('.loc-result').forEach(el => {
    el.addEventListener('click', () => selectResult(parseInt(el.dataset.idx, 10)));
  });
}

function selectResult(i) {
  const r = results[i];
  if (!r) return;
  saveLocation({
    name: r.name.toLowerCase(),
    lat: r.latitude,
    lon: r.longitude,
    tz: r.timezone || null,  // IANA tz like "America/Guayaquil" - critical for WHEN mode time interpretation
  });
  closeLoc();
  render();
}

async function search(q) {
  if (q.length < 2) { results = []; renderResults(); return; }
  try {
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=${currentLang}&format=json`);
    const data = await r.json();
    results = data.results || [];
    selectedIdx = -1;
    renderResults();
  } catch (err) {
    results = [];
    renderResults();
  }
}

// Open the picker by clicking the location display label (not the input)
const locDisplay = locBtn.querySelector('.loc-display');
locDisplay.addEventListener('click', (e) => {
  e.stopPropagation();
  openLoc();
});

// Prevent clicks inside the picker (input, results) from bubbling and closing
locPicker.addEventListener('click', (e) => {
  e.stopPropagation();
});

document.addEventListener('click', (e) => {
  if (locPicker.classList.contains('open') && !locBtn.contains(e.target)) {
    closeLoc();
  }
});

locInput.addEventListener('input', () => {
  const q = locInput.value.trim();
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => search(q), 300);
});

locInput.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { e.preventDefault(); closeLoc(); return; }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (results.length === 0) return;
    selectedIdx = Math.min(results.length - 1, selectedIdx + 1);
    renderResults();
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (results.length === 0) return;
    selectedIdx = Math.max(0, selectedIdx - 1);
    renderResults();
    return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    if (selectedIdx >= 0) selectResult(selectedIdx);
    else if (results.length > 0) selectResult(0);
  }
});

/* ───────── flexible date parser ─────────
   Accepts essentially any human-readable date format:
     "2026-05-15"           ISO
     "5/15/2026"            US slash
     "15/5/2026"            European slash (ambiguous with US; we try both)
     "5-15-2026"            slash variant
     "may 15 2026"          month name first
     "15 may 2026"          day first with month name
     "may 15, 2026"         with comma
     "2026-05-15 14:30"     with time
     "may 15 2026 2:30 pm"  natural language with am/pm
     "1969-07-21T02:56"     ISO with T separator

   Strategy:
   1. Try a series of regex patterns from most specific to most permissive
   2. For ambiguous formats like "5/6/2026", prefer M/D/YYYY (US) since site is in English
   3. Fall back to Date.parse() for anything else
   4. Return null if all attempts fail. */
const MONTHS = {
  jan: 0, january: 0,
  feb: 1, february: 1,
  mar: 2, march: 2,
  apr: 3, april: 3,
  may: 4,
  jun: 5, june: 5,
  jul: 6, july: 6,
  aug: 7, august: 7,
  sep: 8, sept: 8, september: 8,
  oct: 9, october: 9,
  nov: 10, november: 10,
  dec: 11, december: 11,
};

function parseFlexibleDate(input) {
  if (!input) return null;
  let s = input.trim().toLowerCase().replace(/,/g, ' ').replace(/\s+/g, ' ');

  // Extract trailing time if present: "HH:MM" optionally followed by am/pm
  let hours = 12, minutes = 0; // default to noon if no time given
  const timeMatch = s.match(/\b(\d{1,2}):(\d{2})\s*(am|pm)?\b/);
  if (timeMatch) {
    hours = parseInt(timeMatch[1], 10);
    minutes = parseInt(timeMatch[2], 10);
    if (timeMatch[3] === 'pm' && hours < 12) hours += 12;
    if (timeMatch[3] === 'am' && hours === 12) hours = 0;
    s = s.replace(timeMatch[0], '').trim();
  }
  // Also try "HHam"/"HHpm" without minutes
  const hourOnlyMatch = s.match(/\b(\d{1,2})\s*(am|pm)\b/);
  if (!timeMatch && hourOnlyMatch) {
    hours = parseInt(hourOnlyMatch[1], 10);
    if (hourOnlyMatch[2] === 'pm' && hours < 12) hours += 12;
    if (hourOnlyMatch[2] === 'am' && hours === 12) hours = 0;
    s = s.replace(hourOnlyMatch[0], '').trim();
  }
  // Also handle ISO T separator
  s = s.replace(/t/g, ' ').trim();

  // Pattern 1: ISO YYYY-MM-DD or YYYY/MM/DD
  let m = s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
  if (m) {
    return makeDate(+m[1], +m[2] - 1, +m[3], hours, minutes);
  }

  // Pattern 2: month name with day and year, in any order
  // "may 15 2026" or "15 may 2026" or "2026 may 15"
  const monthNames = Object.keys(MONTHS).join('|');
  m = s.match(new RegExp(`\\b(${monthNames})\\b`));
  if (m) {
    const monthIdx = MONTHS[m[1]];
    const remainder = s.replace(m[0], '').trim().split(/\s+/).filter(Boolean);
    if (remainder.length >= 2) {
      const nums = remainder.map(Number).filter(n => !isNaN(n));
      if (nums.length >= 2) {
        // The 4-digit one is the year; the other is the day
        const year = nums.find(n => n >= 1000) || nums.find(n => n > 31);
        const day = nums.find(n => n !== year && n >= 1 && n <= 31);
        if (year && day) {
          return makeDate(year, monthIdx, day, hours, minutes);
        }
      }
    }
    // Just month + year ("may 2026")
    if (remainder.length === 1) {
      const n = parseInt(remainder[0], 10);
      if (n >= 1000) return makeDate(n, monthIdx, 1, hours, minutes);
    }
  }

  // Pattern 3: numeric M/D/YYYY or M-D-YYYY (US convention)
  m = s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})$/);
  if (m) {
    let year = +m[3];
    if (year < 100) year += 2000; // 2-digit year → 20xx
    const a = +m[1], b = +m[2];
    // If first number is clearly a day (>12), use D/M/Y
    if (a > 12 && b <= 12) return makeDate(year, b - 1, a, hours, minutes);
    // Otherwise prefer M/D/Y (US)
    return makeDate(year, a - 1, b, hours, minutes);
  }

  // Pattern 4: just a 4-digit year alone → Jan 1 of that year
  m = s.match(/^(\d{4})$/);
  if (m) return makeDate(+m[1], 0, 1, hours, minutes);

  // Last resort: native Date parser (handles "May 15, 2026 14:30" etc)
  const native = new Date(input);
  if (!isNaN(native.getTime())) return native;

  return null;
}

function makeDate(y, m, d, h, mi) {
  const date = new Date(y, m, d, h, mi);
  return isNaN(date.getTime()) ? null : date;
}

/* ───────── mode toggle (NOW ↔ THEN) ─────────
   Toggle behavior:
     NOW → THEN: capture current time as the wheels' starting state.
       Wheels display the present moment; user spins individual wheels
       to navigate to a different time. Chart updates live as wheels spin.
     THEN → NOW: forget the wheel state, return to live ticking time.
*/
const modeToggle = document.getElementById('modeToggle');
modeToggle.addEventListener('click', () => {
  if (mode === 'now') {
    mode = 'then-set';
    frozenTime = new Date();  // start from current moment
    renderWheels();
    updateURL();
    render();
  } else {
    mode = 'now';
    frozenTime = null;
    updateURL();
    render();
  }
});

/* ───────── date wheels ─────────
   Each wheel cell is a clickable region that cycles through valid values
   for that field (day, month, year, hour, minute, weekday).
   
   Interaction model:
   - Click cell: step +1 (or shift+click for -1)
   - Scroll wheel up/down while hovering over cell: step ±1
   - Focus cell + press arrow keys ↑↓: step ±1
   - Touch + drag vertical: step (handled via touchmove)
   - The weekday cell is read-only (derived from the date)
   
   The wheels write to frozenTime, then trigger render() to update the chart.
   Day count is automatically constrained by month (e.g., Feb 29 only on leap years).
*/
const MONTH_NAMES = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const WEEKDAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

/* ───────── timezone-aware date handling ─────────
   CRITICAL: When the user types a time in WHEN mode like "17:42" with
   QUITO selected, they mean "17:42 in Quito" — NOT "17:42 in their browser's
   timezone." Browser-native Date methods (getHours, setHours) operate in
   the device's local timezone, which is wrong when the chart location
   differs from where the user is sitting.
   
   These helpers read and write date components in the LOCATION's timezone,
   so wheel values always mean what they appear to mean: local to where
   the chart is being computed for. Without this, a Quito chart entered
   from a New York device would be off by 1-2 hours and the Ascendant
   would be wrong by ~15-30 degrees. */

function getLocationTz() {
  const loc = getLocation();
  return loc.tz || Intl.DateTimeFormat().resolvedOptions().timeZone;
}

// Extract date components AS THEY APPEAR in the given timezone.
// Returns { year, month (0-11), day, hour, minute, second, weekday (0-6, Sun=0) }.
function getPartsInTz(date, tz) {
  const fmt = new Intl.DateTimeFormat('en-US', {
    timeZone: tz,
    year: 'numeric', month: 'numeric', day: 'numeric',
    hour: 'numeric', minute: 'numeric', second: 'numeric',
    weekday: 'short',
    hour12: false,
  });
  const parts = {};
  for (const p of fmt.formatToParts(date)) {
    if (p.type === 'year') parts.year = parseInt(p.value, 10);
    else if (p.type === 'month') parts.month = parseInt(p.value, 10) - 1;
    else if (p.type === 'day') parts.day = parseInt(p.value, 10);
    else if (p.type === 'hour') parts.hour = parseInt(p.value, 10) % 24;  // handle "24" edge case
    else if (p.type === 'minute') parts.minute = parseInt(p.value, 10);
    else if (p.type === 'second') parts.second = parseInt(p.value, 10);
    else if (p.type === 'weekday') {
      const wdMap = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 };
      parts.weekday = wdMap[p.value];
    }
  }
  return parts;
}

// Construct a UTC Date that, when displayed in the given timezone, shows
// the specified components. Inverse of getPartsInTz.
// Uses iterative correction because the relationship between local civil
// time and UTC depends on the timezone's offset at that moment (DST etc).
function makeDateInTz(year, month, day, hour, minute, tz) {
  // First guess: pretend the components are UTC
  let d = new Date(Date.UTC(year, month, day, hour, minute, 0));
  // See what those components look like in the target tz
  let parts = getPartsInTz(d, tz);
  // Compute the offset between what we wanted and what we got
  const wanted = year * 525600 + month * 43200 + day * 1440 + hour * 60 + minute;
  let got = parts.year * 525600 + parts.month * 43200 + parts.day * 1440 + parts.hour * 60 + parts.minute;
  let diffMin = wanted - got;
  // Adjust by that offset
  d = new Date(d.getTime() + diffMin * 60000);
  // One more pass in case of DST transition boundary
  parts = getPartsInTz(d, tz);
  got = parts.year * 525600 + parts.month * 43200 + parts.day * 1440 + parts.hour * 60 + parts.minute;
  diffMin = wanted - got;
  if (diffMin !== 0) {
    d = new Date(d.getTime() + diffMin * 60000);
  }
  return d;
}

function renderWheels() {
  if (!frozenTime) return;
  const tz = getLocationTz();
  const p = getPartsInTz(frozenTime, tz);
  // Use language-aware names; fall back to English for typed-input matching
  const weekdays = WEEKDAYS_BY_LANG[currentLang] || WEEKDAYS_BY_LANG.en;
  const months = MONTHS_BY_LANG[currentLang] || MONTHS_BY_LANG.en;
  document.getElementById('w-weekday').textContent = weekdays[p.weekday];
  document.getElementById('w-day').textContent = String(p.day).padStart(2, '0');
  document.getElementById('w-month').textContent = months[p.month];
  document.getElementById('w-year').textContent = String(p.year);
  document.getElementById('w-hour').textContent = String(p.hour).padStart(2, '0');
  document.getElementById('w-minute').textContent = String(p.minute).padStart(2, '0');
}

function daysInMonth(year, month) {
  // month is 0-indexed; day 0 of (month+1) gives last day of month
  return new Date(year, month + 1, 0).getDate();
}

function stepWheel(field, direction) {
  if (!frozenTime) frozenTime = new Date();
  const tz = getLocationTz();
  const p = getPartsInTz(frozenTime, tz);
  
  switch (field) {
    case 'day': {
      let day = p.day + direction;
      const max = daysInMonth(p.year, p.month);
      if (day < 1) day = max;
      if (day > max) day = 1;
      p.day = day;
      break;
    }
    case 'month': {
      let month = p.month + direction;
      if (month < 0) month = 11;
      if (month > 11) month = 0;
      const maxDay = daysInMonth(p.year, month);
      if (p.day > maxDay) p.day = maxDay;
      p.month = month;
      break;
    }
    case 'year': {
      const year = p.year + direction;
      const maxDay = daysInMonth(year, p.month);
      if (p.day > maxDay) p.day = maxDay;
      p.year = year;
      break;
    }
    case 'hour': {
      let hour = p.hour + direction;
      if (hour < 0) hour = 23;
      if (hour > 23) hour = 0;
      p.hour = hour;
      break;
    }
    case 'minute': {
      let minute = p.minute + direction;
      if (minute < 0) minute = 59;
      if (minute > 59) minute = 0;
      p.minute = minute;
      break;
    }
    case 'weekday': {
      // Stepping weekday = jumping by 1 day in the location's timezone
      let day = p.day + direction;
      const max = daysInMonth(p.year, p.month);
      if (day < 1) {
        let prevMonth = p.month - 1, prevYear = p.year;
        if (prevMonth < 0) { prevMonth = 11; prevYear--; }
        p.month = prevMonth; p.year = prevYear;
        p.day = daysInMonth(prevYear, prevMonth);
      } else if (day > max) {
        let nextMonth = p.month + 1, nextYear = p.year;
        if (nextMonth > 11) { nextMonth = 0; nextYear++; }
        p.month = nextMonth; p.year = nextYear;
        p.day = 1;
      } else {
        p.day = day;
      }
      break;
    }
  }
  
  // Reconstruct as UTC moment that displays correctly in location's timezone
  frozenTime = makeDateInTz(p.year, p.month, p.day, p.hour, p.minute, tz);
  renderWheels();
  updateURL();
  render();
  
  // Visual feedback: brief flash on the changed cell
  const cell = document.querySelector(`.wheel-cell[data-wheel="${field}"]`);
  if (cell) {
    cell.classList.add('spinning');
    setTimeout(() => cell.classList.remove('spinning'), 150);
  }
}

// Wire up each wheel cell.
// Interaction model:
//   - Click cell: focus + select existing value; ready to be replaced by typing
//   - Type digits (or month letters): replaces value live, committing on Enter/blur
//   - Arrow ↑/↓: step ±1 from current committed value (small adjustments)
//   - Scroll wheel: step ±1 (small adjustments)
//   - Touch drag vertical: step (small adjustments)
//   - Escape: cancel current typing, restore previous value
//   - Tab / Enter: commit typed value, move to next cell (Tab) or just commit (Enter)
document.querySelectorAll('.wheel-cell').forEach(cell => {
  const field = cell.dataset.wheel;
  const valEl = cell.querySelector('.wheel-val');
  cell.setAttribute('tabindex', '0');
  
  // Track edit state on the cell itself
  cell.editing = false;
  cell.editBuffer = '';
  
  function beginEdit() {
    if (cell.editing) return;
    cell.editing = true;
    cell.editBuffer = '';
    cell.classList.add('editing');
    // The placeholder shows what they're replacing while empty
    valEl.dataset.original = valEl.textContent;
  }
  
  function cancelEdit() {
    if (!cell.editing) return;
    cell.editing = false;
    cell.editBuffer = '';
    cell.classList.remove('editing');
    // Re-render to restore actual value
    renderWheels();
  }
  
  function commitEdit() {
    if (!cell.editing) return;
    const raw = cell.editBuffer.trim();
    cell.editing = false;
    cell.editBuffer = '';
    cell.classList.remove('editing');
    if (!raw) {
      renderWheels();
      return;
    }
    applyTypedValue(field, raw);
  }
  
  // Focus enters "ready to type" state but doesn't show empty
  cell.addEventListener('focus', () => {
    // Just focus, ready to receive typed input
  });
  
  cell.addEventListener('blur', () => {
    commitEdit();
  });
  
  // Single click/tap: focus the cell and bring up keyboard on mobile via the proxy input
  cell.addEventListener('click', (e) => {
    cell.focus();
    // On mobile, also focus the proxy input to summon the keyboard.
    // Desktop ignores this (proxy is invisible, focus stays effectively on cell).
    const proxy = document.getElementById('wheelInputProxy');
    if (proxy) {
      proxy.value = '';
      proxy.focus();
      // Mark the cell as the one receiving input
      window.activeWheelCell = cell;
    }
  });
  
  // Mouse scroll wheel: step value ±1 (small adjustments still work)
  cell.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (cell.editing) commitEdit();
    stepWheel(field, e.deltaY > 0 ? 1 : -1);
  }, { passive: false });
  
  // Keyboard input
  cell.addEventListener('keydown', (e) => {
    // Arrow keys step the value (small adjustments)
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (cell.editing) commitEdit();
      stepWheel(field, -1);
      return;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (cell.editing) commitEdit();
      stepWheel(field, 1);
      return;
    }
    
    // Enter commits and unfocuses
    if (e.key === 'Enter') {
      e.preventDefault();
      commitEdit();
      cell.blur();
      return;
    }
    
    // Escape cancels editing
    if (e.key === 'Escape') {
      e.preventDefault();
      cancelEdit();
      cell.blur();
      return;
    }
    
    // Tab commits and moves to next cell naturally (don't preventDefault)
    if (e.key === 'Tab') {
      commitEdit();
      return;
    }
    
    // Backspace removes last typed char
    if (e.key === 'Backspace') {
      e.preventDefault();
      if (!cell.editing) beginEdit();
      cell.editBuffer = cell.editBuffer.slice(0, -1);
      valEl.textContent = cell.editBuffer || '—';
      return;
    }
    
    // Printable characters add to buffer
    if (e.key.length === 1 && !e.metaKey && !e.ctrlKey && !e.altKey) {
      e.preventDefault();
      // Filter input by field type
      const isDigit = /[0-9]/.test(e.key);
      const isLetter = /[a-zA-Z]/.test(e.key);
      
      // Year/day/hour/minute accept digits only
      if ((field === 'year' || field === 'day' || field === 'hour' || field === 'minute') && !isDigit) return;
      // Month accepts digits OR letters
      if (field === 'month' && !isDigit && !isLetter) return;
      // Weekday accepts letters (for "MON" etc.)
      if (field === 'weekday' && !isLetter) return;
      
      if (!cell.editing) beginEdit();
      cell.editBuffer += e.key;
      valEl.textContent = cell.editBuffer.toUpperCase();
      
      // Auto-commit when buffer reaches expected length
      const expectedLen = {
        day: 2, month: 3, year: 4, hour: 2, minute: 2, weekday: 3
      }[field];
      if (cell.editBuffer.length >= expectedLen) {
        // Validate what they typed; if invalid for partial (day 4 + something would exceed),
        // try to commit immediately
        if (field === 'day' || field === 'hour' || field === 'minute') {
          // Check if buffer is interpretable
          const n = parseInt(cell.editBuffer, 10);
          const limits = { day: [1, 31], hour: [0, 23], minute: [0, 59] };
          const [lo, hi] = limits[field];
          if (n >= lo && n <= hi) {
            commitEdit();
            // Move focus to next sibling cell for fluid entry
            focusNextCell(cell);
          }
        } else if (field === 'year' && cell.editBuffer.length === 4) {
          commitEdit();
          focusNextCell(cell);
        } else if (field === 'month' && cell.editBuffer.length === 3 && isLetter) {
          commitEdit();
          focusNextCell(cell);
        }
      }
    }
  });
  
  // Touch drag — accumulate vertical movement and step at threshold
  let touchStartY = null;
  let touchAccum = 0;
  let touchMoved = false;
  cell.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
    touchAccum = 0;
    touchMoved = false;
  }, { passive: true });
  cell.addEventListener('touchmove', (e) => {
    if (touchStartY === null) return;
    const dy = e.touches[0].clientY - touchStartY;
    touchAccum = dy;
    const STEP_PX = 20;
    while (Math.abs(touchAccum) >= STEP_PX) {
      touchMoved = true;
      if (touchAccum > 0) {
        stepWheel(field, -1);
        touchAccum -= STEP_PX;
      } else {
        stepWheel(field, 1);
        touchAccum += STEP_PX;
      }
      touchStartY = e.touches[0].clientY - touchAccum;
    }
  }, { passive: true });
});

function focusNextCell(cell) {
  const cells = Array.from(document.querySelectorAll('.wheel-cell'));
  const idx = cells.indexOf(cell);
  const next = cells[idx + 1];
  if (next) {
    next.focus();
    // On mobile, keep proxy focused so keyboard stays up across cells
    const proxy = document.getElementById('wheelInputProxy');
    if (proxy && document.activeElement === proxy) {
      window.activeWheelCell = next;
      proxy.value = '';
    }
  }
}

/* ───────── mobile keyboard proxy ─────────
   On mobile, tapping a wheel cell focuses a hidden input (iOS needs a real
   input to summon the keyboard). All keystrokes typed into the proxy are
   forwarded to the currently-active wheel cell as synthetic keydown events,
   which the cell's keydown handler already knows how to process. */
const wheelProxy = document.getElementById('wheelInputProxy');
if (wheelProxy) {
  // Handle each character typed via the input event (most reliable on iOS).
  // The proxy receives one character at a time; we forward it to the active
  // wheel cell as a synthetic keydown so the cell's existing logic handles it.
  wheelProxy.addEventListener('input', (e) => {
    const cell = window.activeWheelCell;
    if (!cell) { wheelProxy.value = ''; return; }
    const typed = wheelProxy.value;
    if (!typed) return;
    // For each character that was typed, dispatch a synthetic keydown to the cell
    for (const char of typed) {
      const forwarded = new KeyboardEvent('keydown', {
        key: char,
        bubbles: true,
        cancelable: true,
      });
      cell.dispatchEvent(forwarded);
    }
    wheelProxy.value = '';
  });
  
  // Special keys (Enter, Backspace, Escape, arrows) come through as proper keydowns
  wheelProxy.addEventListener('keydown', (e) => {
    const cell = window.activeWheelCell;
    if (!cell) return;
    // Only forward "special" keys here — printable chars come via input event
    const specialKeys = ['Enter', 'Backspace', 'Escape', 'Tab', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
    if (specialKeys.includes(e.key)) {
      const forwarded = new KeyboardEvent('keydown', {
        key: e.key,
        bubbles: true,
        cancelable: true,
      });
      cell.dispatchEvent(forwarded);
      if (forwarded.defaultPrevented) e.preventDefault();
    }
  });
  
  // When proxy is blurred (user dismisses keyboard), clear active cell
  wheelProxy.addEventListener('blur', () => {
    window.activeWheelCell = null;
  });
}

/* Apply a typed value to the date. The string `raw` is whatever the user typed —
   we interpret it depending on the field. Invalid values are silently ignored
   (re-render restores the previous value). */
function applyTypedValue(field, raw) {
  if (!frozenTime) frozenTime = new Date();
  const tz = getLocationTz();
  const p = getPartsInTz(frozenTime, tz);
  const upper = raw.toUpperCase();
  
  switch (field) {
    case 'year': {
      const y = parseInt(raw, 10);
      if (!isFinite(y) || y < 1 || y > 9999) { renderWheels(); return; }
      const maxDay = daysInMonth(y, p.month);
      if (p.day > maxDay) p.day = maxDay;
      p.year = y;
      break;
    }
    case 'day': {
      const n = parseInt(raw, 10);
      const max = daysInMonth(p.year, p.month);
      if (!isFinite(n) || n < 1 || n > max) { renderWheels(); return; }
      p.day = n;
      break;
    }
    case 'month': {
      let monthIdx = -1;
      const n = parseInt(raw, 10);
      if (isFinite(n) && n >= 1 && n <= 12) {
        monthIdx = n - 1;
      } else {
        const code = upper.slice(0, 3);
        const langMonths = MONTHS_BY_LANG[currentLang] || MONTHS_BY_LANG.en;
        let idx = langMonths.indexOf(code);
        if (idx < 0) idx = MONTHS_BY_LANG.en.indexOf(code);
        if (idx >= 0) monthIdx = idx;
      }
      if (monthIdx < 0) { renderWheels(); return; }
      const maxDay = daysInMonth(p.year, monthIdx);
      if (p.day > maxDay) p.day = maxDay;
      p.month = monthIdx;
      break;
    }
    case 'hour': {
      const n = parseInt(raw, 10);
      if (!isFinite(n) || n < 0 || n > 23) { renderWheels(); return; }
      p.hour = n;
      break;
    }
    case 'minute': {
      const n = parseInt(raw, 10);
      if (!isFinite(n) || n < 0 || n > 59) { renderWheels(); return; }
      p.minute = n;
      break;
    }
    case 'weekday': {
      const code = upper.slice(0, 3);
      const langWeekdays = WEEKDAYS_BY_LANG[currentLang] || WEEKDAYS_BY_LANG.en;
      let idx = langWeekdays.indexOf(code);
      if (idx < 0) idx = WEEKDAYS_BY_LANG.en.indexOf(code);
      if (idx < 0) { renderWheels(); return; }
      const delta = idx - p.weekday;
      // Add delta days
      let newDay = p.day + delta;
      while (newDay < 1) {
        let prevMonth = p.month - 1, prevYear = p.year;
        if (prevMonth < 0) { prevMonth = 11; prevYear--; }
        newDay += daysInMonth(prevYear, prevMonth);
        p.month = prevMonth; p.year = prevYear;
      }
      while (newDay > daysInMonth(p.year, p.month)) {
        newDay -= daysInMonth(p.year, p.month);
        p.month++;
        if (p.month > 11) { p.month = 0; p.year++; }
      }
      p.day = newDay;
      break;
    }
  }
  
  // Reconstruct as UTC moment that displays correctly in location's tz
  frozenTime = makeDateInTz(p.year, p.month, p.day, p.hour, p.minute, tz);
  renderWheels();
  updateURL();
  render();
}

/* ───────── URL state ─────────
   /              → mode='now', no frozenTime
   /?then         → mode='then', frozenTime = now (start point)
   /?t=ISO        → mode='then', frozenTime = parsed ISO
*/
function updateURL() {
  if (mode === 'now') {
    history.replaceState(null, '', window.location.pathname);
  } else if (frozenTime) {
    const t = frozenTime;
    const pad = (n) => String(n).padStart(2, '0');
    const iso = `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}T${pad(t.getHours())}:${pad(t.getMinutes())}`;
    history.replaceState(null, '', `?t=${iso}`);
  }
}

function readURL() {
  const params = new URLSearchParams(window.location.search);
  if (params.has('t')) {
    const parsed = parseFlexibleDate(params.get('t'));
    if (parsed) {
      mode = 'then-set';
      frozenTime = parsed;
      return;
    }
  }
  // Legacy URL: /?then defaults to NOW since there's no empty state anymore
  mode = 'now';
  frozenTime = null;
}

/* ───────── attempt geolocation once, silently ───────── */
function tryGeolocate() {
  if (!navigator.geolocation) return;
  // only auto-locate on first visit; respect stored preference after
  if (localStorage.getItem('elcielo_loc')) return;
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      try {
        const r = await fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&language=en&format=json`);
        const data = await r.json();
        // Prefer city, then admin1 (state/province), then country
        const result = data.results && data.results[0];
        const name = result ? (result.name || result.admin1 || result.country || 'unknown') : 'unknown';
        saveLocation({
          name: name.toLowerCase(),
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          tz: result?.timezone || null,
        });
      } catch (e) {
        // If reverse geocoder fails, keep the NYC default rather than falling to 'here'
        // (the default is already NYC, so we just don't overwrite it)
        return;
      }
      render();
    },
    () => { /* silent — geolocation denied, keep NYC default */ },
    { timeout: 3000, maximumAge: 600000 }
  );
}

/* ───────── boot ───────── */
readURL();
renderLangPicker();
applyStaticTranslations();
render();
tryGeolocate();
// Tick once a minute, but only when in NOW mode — frozen state stays frozen.
setInterval(() => { if (mode === 'now') render(); }, 60000);

/* ───────── wordmark interaction ─────────
   Click the wordmark to reveal its self-definition. Definition auto-reverts
   after 4 seconds, or immediately if clicked again / clicked outside.
   The instrument names itself, then returns to its name. */
const wordmarkEl = document.getElementById('wordmark');
let wordmarkRevealed = false;
let wordmarkTimer = null;

function revealWordmark() {
  wordmarkRevealed = true;
  wordmarkEl.textContent = t('wordmarkDef');
  wordmarkEl.classList.add('defined');
  // Auto-revert after 4 seconds — long enough to read once, short enough
  // to feel like a momentary gesture, not a state change.
  clearTimeout(wordmarkTimer);
  wordmarkTimer = setTimeout(hideWordmark, 4000);
}
function hideWordmark() {
  wordmarkRevealed = false;
  wordmarkEl.textContent = t('wordmark');
  wordmarkEl.classList.remove('defined');
  clearTimeout(wordmarkTimer);
  wordmarkTimer = null;
}

wordmarkEl.addEventListener('click', (e) => {
  e.stopPropagation();
  if (wordmarkRevealed) hideWordmark();
  else revealWordmark();
});

// Click anywhere outside the wordmark hides the definition immediately
document.addEventListener('click', (e) => {
  if (wordmarkRevealed && !wordmarkEl.contains(e.target)) {
    hideWordmark();
  }
});

// When language changes while definition is shown, refresh to new language
// and reset the timer so user gets fresh 4 seconds to read.
const origSetLang = setLang;
setLang = function(lang) {
  const wasRevealed = wordmarkRevealed;
  origSetLang(lang);
  if (wasRevealed) revealWordmark();  // re-reveals with new language + fresh timer
};
</script>
